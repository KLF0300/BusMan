<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusMan</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: grid; place-items: center; min-height: 100vh; }
    #game { border: 2px solid #1e90ff; image-rendering: pixelated; }
    .hud { margin-top: 10px; display:flex; gap:20px; justify-content: space-between; }
  </style>
</head>
<body>
  <div>
    <canvas id="game" width="420" height="420"></canvas>
    <div class="hud">
      <div id="score">Score: 0</div>
      <div id="passengers">Passengers left: 0</div>
      <div>Arrows/WASD to drive • M toggle music</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
